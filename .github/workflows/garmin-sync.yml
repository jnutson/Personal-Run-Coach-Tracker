name: Garmin Sync

on:
  schedule:
    - cron: "0 16 * * *"   # 9:00 AM PDT (UTC-7) — morning, backfills sleep
    - cron: "0 19 * * *"   # 12:00 PM PDT — midday steps, load, battery
    - cron: "30 2 * * *"   # 7:30 PM PDT — evening activity, HRV, metrics
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install garminconnect requests python-dotenv

      - name: Run Garmin sync
        working-directory: scripts
        env:
          GARMIN_EMAIL:          ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:       ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_OAUTH_TOKEN:    ${{ secrets.GARMIN_OAUTH_TOKEN }}
          NEXT_PUBLIC_APP_URL:   ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SYNC_SECRET:           ${{ secrets.SYNC_SECRET }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 garmin_sync.py
