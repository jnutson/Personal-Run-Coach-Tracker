<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Clip crosshatch lines to the cap shape -->
    <clipPath id="cap">
      <path d="M5 16 Q5 7 16 6.5 Q27 7 27 16 Z"/>
    </clipPath>
  </defs>

  <!-- Warm sand background -->
  <circle cx="16" cy="16" r="16" fill="#e8d5b7"/>

  <!-- Body — open path (no top stroke), filled tan; cap renders on top -->
  <path d="M9 16 Q7 17 7 22 Q7 29 16 30 Q25 29 25 22 Q25 17 23 16"
    fill="#c8a070" stroke="#6b3010" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cap — wide dome; Z draws the single meeting line -->
  <path d="M5 16 Q5 7 16 6.5 Q27 7 27 16 Z"
    fill="#9a5f2d" stroke="#6b3010" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Crosshatch texture on cap, clipped to cap shape -->
  <g clip-path="url(#cap)" stroke="#5c2e08" stroke-width="1.1" stroke-linecap="round" opacity="0.45">
    <line x1="7"  y1="7"  x2="16" y2="17"/>
    <line x1="13" y1="6.5" x2="23" y2="17"/>
    <line x1="19" y1="7"  x2="27" y2="16"/>
    <line x1="25" y1="7"  x2="16" y2="17"/>
    <line x1="19" y1="6.5" x2="9"  y2="17"/>
    <line x1="13" y1="7"  x2="5"  y2="16"/>
  </g>

  <!-- Stem — small arch nub on top of cap -->
  <path d="M13 6.5 Q13 3 16 3 Q19 3 19 6.5"
    fill="#9a5f2d" stroke="#6b3010" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
